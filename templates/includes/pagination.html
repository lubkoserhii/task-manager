{% if is_paginated %}
  <div class="mt-4 d-flex justify-content-center">
    <ul class="pagination">
      {% if page_obj.has_previous %}
        <li class="page-item">
          <a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if search_query %}&q={{ search_query|urlencode }}{% endif %}{% if current_filter %}&filter={{ current_filter|urlencode }}{% endif %}">
            <i class="ti ti-chevron-left me-1"></i>Previous
          </a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link"><i class="ti ti-chevron-left me-1"></i>Previous</span>
        </li>
      {% endif %}

      <li class="page-item active">
        <span class="page-link">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
      </li>

      {% if page_obj.has_next %}
        <li class="page-item">
          <a class="page-link" href="?page={{ page_obj.next_page_number }}{% if search_query %}&q={{ search_query|urlencode }}{% endif %}{% if current_filter %}&filter={{ current_filter|urlencode }}{% endif %}">
            Next<i class="ti ti-chevron-right ms-1"></i>
          </a>
        </li>
      {% else %}
        <li class="page-item disabled">
          <span class="page-link">Next<i class="ti ti-chevron-right ms-1"></i></span>
        </li>
      {% endif %}
    </ul>
  </div>
{% endif %}
