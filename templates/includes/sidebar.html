<aside class="sidebar">
  <a class="sidebar__brand" href="{% url 'tasks:home' %}">Task Manager</a>

  <nav class="sidebar__nav">
    <a href="{% url 'tasks:home' %}">Home</a>
    <a href="{% url 'tasks:task-list' %}">Tasks</a>
    <a href="{% url 'tasks:worker-list' %}">Workers</a>
    <a href="{% url 'tasks:position-list' %}">Positions</a>
    <a href="{% url 'tasks:task-type-list' %}">Task types</a>

    {% if user.is_authenticated %}
      <form action="{% url 'accounts:logout' %}" method="post">
        {% csrf_token %}
        <button class="btn btn-link p-0 border-0 align-baseline" type="submit">
          Logout
        </button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}">Login</a>
      <a href="{% url 'tasks:register' %}">Register</a>
    {% endif %}
  </nav>
</aside>
