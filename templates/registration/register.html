{% extends "base_auth.html" %}

{% block title %}<title>Register | Task Manager</title>{% endblock %}

{% block content %}
<div class="container container-tight py-4">
  <div class="text-center mb-4">
    <h2 class="h1">
      <i class="ti ti-checkup-list text-primary me-2"></i>Task Manager
    </h2>
    <p class="text-muted">Create a new account</p>
  </div>

  <div class="card card-md">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Create account</h2>

      <form method="post" autocomplete="off">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-footer">
          <button type="submit" class="btn btn-primary w-100">
            <i class="ti ti-user-plus me-1"></i>Create account
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="text-center text-muted mt-3">
    Already have an account? <a href="{% url 'accounts:login' %}" tabindex="-1">Sign in</a>
  </div>
</div>
{% endblock %}
