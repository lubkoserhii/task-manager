{% extends "base.html" %}

{% block title %}Login | Task Manager{% endblock %}

{% block content %}
  <h1>Login</h1>

  {% if form.errors %}
    <p>Your username and password did not match. Please try again.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
  </form>
{% endblock %}
