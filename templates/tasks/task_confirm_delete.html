{% extends "base.html" %}

{% block title %}<title>Delete task | Task Manager</title>{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="card border-danger">
      <div class="card-status-top bg-danger"></div>
      <div class="card-body text-center py-5">
        <div class="mb-4">
          <span class="avatar avatar-xl bg-danger-lt text-danger">
            <i class="ti ti-trash" style="font-size: 2rem;"></i>
          </span>
        </div>
        <h3 class="mb-1">Delete task</h3>
        <p class="text-muted mb-4">
          Are you sure you want to delete <strong>"{{ task }}"</strong>?<br>
          This action cannot be undone.
        </p>
        <div class="d-flex justify-content-center gap-2">
          <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">
              <i class="ti ti-trash me-1"></i>Delete
            </button>
          </form>
          <a class="btn btn-outline-secondary" href="{% url 'tasks:task-detail' pk=task.pk %}">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
