{% extends "base.html" %}

{% block title %}<title>Delete task</title>{% endblock %}

{% block content %}
  <h1>Delete task</h1>
  <p>Are you sure you want to delete "{{ task }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Delete</button>
    <a href="{% url 'tasks:task-detail' pk=task.pk %}">Cancel</a>
  </form>
{% endblock %}
